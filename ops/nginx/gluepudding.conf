server {
    listen 80;
    listen [::]:80;

    server_name gluepudding.com www.gluepudding.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name gluepudding.com www.gluepudding.com;

    ssl_certificate /etc/nginx/ssl/gluepudding.com.fullchain.cer;
    ssl_certificate_key /etc/nginx/ssl/gluepudding.com.key;

    root /var/www/sites/gluepudding/current/frontend;
    index index.html;
    autoindex off;

    gzip on;
    gzip_vary on;
    gzip_types text/css application/javascript text/javascript application/json image/svg+xml;

    location ^~ /assets/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~* ^/(models|audio|textures|vendor|game)/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=2592000";
    }

    location = /api/auth/session {
        proxy_pass http://127.0.0.1:3250/api/auth/session$is_args$args;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host auth.gluepudding.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Original-URI $scheme://$http_host$request_uri;
        proxy_set_header Cookie $http_cookie;
    }

    location = /api/sessions {
        proxy_pass http://127.0.0.1:3250/api/sessions$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host auth.gluepudding.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Original-URI $scheme://$http_host$request_uri;
        proxy_set_header Cookie $http_cookie;
    }

    location = /__auth_any {
        internal;
        proxy_pass http://127.0.0.1:3250/api/auth/session;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host auth.gluepudding.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Original-URI $scheme://$http_host$request_uri;
        proxy_set_header Cookie $http_cookie;
    }

    location = /__auth_admin {
        internal;
        proxy_pass http://127.0.0.1:3250/api/auth/session?requiredRole=admin;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host auth.gluepudding.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Original-URI $scheme://$http_host$request_uri;
        proxy_set_header Cookie $http_cookie;
    }

    location = /api/fortune/health {
        proxy_pass http://127.0.0.1:3260;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/fortune/tarot/ai {
        if ($request_method != POST) { return 405; }
        auth_request /__auth_any;
        error_page 401 = @fortune_ai_unauthorized;
        error_page 403 = @fortune_ai_forbidden;
        error_page 413 = @fortune_ai_too_large;
        error_page 429 = @fortune_ai_limited;
        limit_req zone=gluepudding_fortune_ai_ip burst=2 nodelay;
        limit_req_status 429;
        limit_conn gluepudding_fortune_ai_global 2;
        limit_conn_status 429;
        client_max_body_size 16k;
        proxy_pass http://127.0.0.1:3260;
        proxy_http_version 1.1;
        proxy_read_timeout 35s;
        proxy_send_timeout 35s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    location = /api/fortune/iching/ai {
        if ($request_method != POST) { return 405; }
        auth_request /__auth_any;
        error_page 401 = @fortune_ai_unauthorized;
        error_page 403 = @fortune_ai_forbidden;
        error_page 413 = @fortune_ai_too_large;
        error_page 429 = @fortune_ai_limited;
        limit_req zone=gluepudding_fortune_ai_ip burst=2 nodelay;
        limit_req_status 429;
        limit_conn gluepudding_fortune_ai_global 2;
        limit_conn_status 429;
        client_max_body_size 16k;
        proxy_pass http://127.0.0.1:3260;
        proxy_http_version 1.1;
        proxy_read_timeout 35s;
        proxy_send_timeout 35s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    location = /api/fortune/admin/tarot/ai {
        if ($request_method != POST) { return 405; }
        auth_request /__auth_admin;
        error_page 401 = @fortune_ai_unauthorized;
        error_page 403 = @fortune_ai_forbidden;
        error_page 413 = @fortune_ai_too_large;
        client_max_body_size 16k;
        proxy_pass http://127.0.0.1:3260;
        proxy_http_version 1.1;
        proxy_read_timeout 35s;
        proxy_send_timeout 35s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    location = /api/fortune/admin/iching/ai {
        if ($request_method != POST) { return 405; }
        auth_request /__auth_admin;
        error_page 401 = @fortune_ai_unauthorized;
        error_page 403 = @fortune_ai_forbidden;
        error_page 413 = @fortune_ai_too_large;
        client_max_body_size 16k;
        proxy_pass http://127.0.0.1:3260;
        proxy_http_version 1.1;
        proxy_read_timeout 35s;
        proxy_send_timeout 35s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    location = /__auth_armbot {
        internal;
        proxy_pass http://127.0.0.1:3250/api/auth/session?requiredRole=armbot;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host auth.gluepudding.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Original-URI $scheme://$http_host$request_uri;
        proxy_set_header Cookie $http_cookie;
    }

    location ^~ /lab-webrtc/ {
        auth_request /__auth_armbot;
        error_page 401 = @lab_webrtc_unauthorized;
        error_page 403 = @lab_webrtc_forbidden;
        add_header Cache-Control "no-store" always;
        rewrite ^/lab-webrtc/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8889;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Original-URI $scheme://$http_host$request_uri;
        proxy_set_header Cookie $http_cookie;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
        proxy_redirect ~^https?://[^/]+/(.*)$ /lab-webrtc/$1;
        proxy_redirect ~^/(.*)$ /lab-webrtc/$1;
    }

    location @fortune_ai_unauthorized {
        default_type application/json;
        add_header Cache-Control "no-store" always;
        return 401 '{"module":"health","success":false,"code":"AUTH_REQUIRED","error":"请先登录后使用 AI 解读。"}';
    }

    location @fortune_ai_forbidden {
        default_type application/json;
        add_header Cache-Control "no-store" always;
        return 403 '{"module":"health","success":false,"code":"FORBIDDEN","error":"当前账号没有访问权限。"}';
    }

    location @fortune_ai_limited {
        default_type application/json;
        add_header Cache-Control "no-store" always;
        add_header Retry-After "20" always;
        return 429 '{"module":"health","success":false,"code":"RATE_LIMITED","error":"AI 解读请求过于频繁，请稍后再试。","retryAfterSeconds":20}';
    }

    location @fortune_ai_too_large {
        default_type application/json;
        add_header Cache-Control "no-store" always;
        return 413 '{"module":"health","success":false,"code":"INVALID_REQUEST","error":"请求内容过大。"}';
    }

    location @lab_webrtc_unauthorized {
        add_header Cache-Control "no-store" always;
        return 401 "Laboratory stream unauthorized";
    }

    location @lab_webrtc_forbidden {
        add_header Cache-Control "no-store" always;
        return 403 "Laboratory stream forbidden";
    }

    location ^~ /api/ {
        default_type application/json;
        return 404 '{"success":false,"error":"not found"}';
    }

    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }

    access_log /var/www/sites/gluepudding/logs/access.log;
    error_log /var/www/sites/gluepudding/logs/error.log;
}
